<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorilas FC - Premium Stadium Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="master-bg"></div>
    <div class="scanline"></div>
    
    <div class="corner-border top-left"></div>
    <div class="corner-border top-right"></div>
    <div class="corner-border bottom-left"></div>
    <div class="corner-border bottom-right"></div>

    <main class="stadium-interface">
        <header class="top-nav">
            <div class="branding">
                <img src="Gorilas.png" alt="Logo" class="team-logo-mini">
                <div class="branding-text">
                    <span class="team-name">GORILAS DE EL SALTO</span>
                    <span class="event-name">OFFICIAL RAFFLE SYSTEM V1.0</span>
                </div>
            </div>
            <div class="system-status">
                <span class="blink">●</span> SECURE CONNECTION: ESTABLISHED
            </div>
        </header>

        <section class="core-display">
            <div class="marquee-container">
                <div class="marquee-text" id="message-bar">SISTEMA INICIALIZADO - ESPERANDO INICIO DE SORTEO</div>
            </div>

            <div class="main-screen">
                <div class="screen-header">
                    <div class="round-indicator">RONDA ACTUAL: <span id="attempt">1</span> / 3</div>
                    <div class="stadium-code">S-CODE: 2026-GFCP</div>
                </div>

                <div class="visualizer">
                    <h1 id="current-name">ESPERANDO ALEATORIZAR..</h1>
                    <div class="folio-box">
                        <span class="label">ID-FOLIO:</span>
                        <span id="current-folio">----</span>
                    </div>
                </div>

                <div class="winner-banner hidden" id="winner-tag"></div>
            </div>
        </section>

        <footer class="bottom-controls">
            <div class="decor-line"></div>
            <button id="draw-btn" class="action-btn">
                <span class="btn-glitch"></span>
                <span class="text">ACTIVAR ALEATORIZADOR DE SORTEO</span>
            </button>
            <div class="decor-line"></div>
        </footer>
    </main>

    <div id="eliminated-overlay" class="overlay-hidden">
        <div class="overlay-box">
            <div class="alert-header">SISTEMA DE ELIMINACIÓN</div>
            <h2 id="eliminated-name">NOMBRE</h2>
            <p id="eliminated-folio-txt">FOLIO: 000</p>
            <button onclick="closeOverlay()" class="confirm-btn">CONTINUAR OPERACIÓN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
